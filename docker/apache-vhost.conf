<VirtualHost *:80>
    # Un gros relevé d'examen scanné (BEPC/BAC, jusqu'à ~250 Mo) peut prendre plusieurs
    # minutes à envoyer sur une connexion lente — au-delà du Timeout Apache par défaut
    # (60s), qui couperait la connexion avant que PHP ne voie la requête complète.
    TimeOut 300

    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        # Toute URL qui ne correspond pas à un fichier réel (assets, images...)
        # est envoyée au front controller Symfony, qui fait le routing.
        FallbackResource /index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
