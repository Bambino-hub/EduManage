; Un relevé d'examen national scanné (BEPC/BAC) peut faire plusieurs centaines de pages
; de photos empilées — largement au-dessus des limites par défaut de PHP (2M/8M), qui
; bloquent l'upload avec "the uploaded file is too large" avant même que le code de
; l'appli ne s'exécute. Voir src/ExamenNational/Form/ExamenNationalUploadType.php (limite
; applicative à 250M, dont ce fichier garantit qu'elle est bien la limite effective).
upload_max_filesize = 280M
post_max_size = 300M

; Un upload de cette taille peut prendre plusieurs minutes sur une connexion lente —
; la valeur par défaut de max_input_time (souvent 60s) couperait la réception en plein
; milieu avant que PHP ne voie la moindre requête.
max_input_time = 300
max_execution_time = 300
